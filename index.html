<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Breadbox — Bakery Operations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap');

:root{
  --bg:#FBF7EF;
  --surface:#FFFFFF;
  --rail:#241A12;
  --rail-soft:#3d2c1c;
  --ink:#271C13;
  --ink-soft:#7a6c58;
  --line:#EFE1D3;
  --gold:#F0672D;
  --gold-deep:#C75525;
  --gold-bg:#FDE8DC;
  --brick:#9C2B2B;
  --brick-bg:#FBEAEA;
  --herb:#4C6B4F;
  --herb-bg:#EAF0E7;
  --radius:12px;
  --font-d:'Fraunces',serif;
  --font-b:'Work Sans',sans-serif;
  --shadow:0 1px 2px rgba(43,33,24,.06), 0 4px 16px rgba(43,33,24,.05);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-b);background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;}
::selection{background:var(--gold-bg);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
h1,h2,h3{font-family:var(--font-d);margin:0;letter-spacing:-.01em;}
.app{display:flex;min-height:100vh;}

/* ---------- rail ---------- */
.rail{
  width:216px;flex-shrink:0;background:linear-gradient(175deg,var(--rail) 0%,var(--rail-soft) 130%);
  color:#f1e9da;display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:6px 8px 20px 8px;border-bottom:1px solid rgba(241,233,218,.14);margin-bottom:14px;}
.brand-logo{width:100%;max-width:172px;height:auto;display:block;}
.brand-sub{font-size:11px;color:#c9b998;letter-spacing:.12em;text-transform:uppercase;padding-left:2px;}
.nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;border:none;background:transparent;
  color:#e7dcc6;font-size:14.5px;font-weight:500;text-align:left;transition:background .15s;
}
.nav-item:hover{background:rgba(241,233,218,.08);}
.nav-item.active{background:var(--gold);color:#271C13;font-weight:600;}
.nav-item svg{flex-shrink:0;opacity:.9;}
.nav-item.active svg{opacity:1;}
.rail-foot{font-size:11px;color:#a3937a;padding:10px 8px 2px;border-top:1px solid rgba(241,233,218,.14);margin-top:8px;}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#7cae7f;margin-right:6px;box-shadow:0 0 0 3px rgba(124,174,127,.18);}
.sync-dot.off{background:#c98a5a;box-shadow:0 0 0 3px rgba(201,138,90,.18);}

/* ---------- main ---------- */
.main{flex:1;padding:28px 34px 60px;max-width:1180px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:14px;flex-wrap:wrap;}
.page-head h1{font-size:27px;font-weight:600;}
.page-sub{color:var(--ink-soft);font-size:13.5px;margin-top:4px;}
.btn{
  display:inline-flex;align-items:center;gap:7px;background:var(--rail);color:#f1e9da;border:none;
  padding:10px 16px;border-radius:9px;font-size:13.5px;font-weight:600;transition:opacity .15s;
}
.btn:hover{opacity:.88;}
.btn.gold{background:var(--gold);color:#271C13;}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
.btn.danger{background:var(--brick-bg);color:var(--brick);}
.btn.sm{padding:7px 12px;font-size:12.5px;}

.grid{display:grid;gap:14px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:900px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.stat-card .label{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.stat-card .value{font-family:var(--font-d);font-size:29px;margin-top:6px;font-weight:600;}
.stat-card .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.stat-card.warn .value{color:var(--brick);}
.stat-card.good .value{color:var(--herb);}

.section-title{font-size:15px;font-weight:700;margin:30px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title .tag{background:var(--gold-bg);color:var(--gold-deep);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:9px 10px;border-bottom:1px solid var(--line);font-weight:700;}
td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.table-scroll{overflow-x:auto;}
.pill{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;display:inline-block;}
.pill.low{background:var(--brick-bg);color:var(--brick);}
.pill.ok{background:var(--herb-bg);color:var(--herb);}
.pill.mid{background:var(--gold-bg);color:var(--gold-deep);}
.muted{color:var(--ink-soft);}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;}

.form-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:#fffdfa;color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);}
.line-item{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center;}
.icon-btn{background:transparent;border:none;padding:6px;border-radius:6px;color:var(--ink-soft);}
.icon-btn:hover{background:var(--bg);color:var(--brick);}
.form-actions{display:flex;gap:8px;margin-top:14px;}

.tabs2{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tabs2 button{background:var(--surface);border:1px solid var(--line);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.tabs2 button.active{background:var(--rail);color:#f1e9da;border-color:var(--rail);}

.recipe-cost-box{background:var(--gold-bg);border:1px solid #ecd6a3;border-radius:10px;padding:14px 16px;margin-top:10px;}
.recipe-cost-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
.recipe-cost-row.total{font-weight:700;border-top:1px dashed #d9bd7e;margin-top:6px;padding-top:8px;}
.margin-good{color:var(--herb);font-weight:700;}
.margin-bad{color:var(--brick);font-weight:700;}

.export-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1px solid rgba(241,233,218,.28);color:#f1e9da;padding:10px 10px;border-radius:9px;font-size:13px;font-weight:600;margin-top:12px;}
.export-btn:hover{background:rgba(241,233,218,.08);}
.modal-overlay{position:fixed;inset:0;background:rgba(43,33,24,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:var(--surface);border-radius:14px;padding:24px 26px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:88vh;overflow-y:auto;}
.modal-box h3{font-size:18px;margin-bottom:4px;}
.modal-box .modal-sub{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
.check-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13.5px;}
.check-row input{width:16px;height:16px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100%;gap:14px;color:var(--ink-soft);font-size:14px;}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:820px){
  .app{flex-direction:column;}
  .rail{width:100%;height:auto;position:sticky;top:0;flex-direction:row;padding:10px 10px;z-index:20;overflow-x:auto;}
  .brand{display:none;}
  .nav{flex-direction:row;flex:none;overflow-x:auto;}
  .nav-item{white-space:nowrap;flex-direction:column;gap:4px;font-size:11px;padding:8px 10px;}
  .rail-foot{display:none;}
  .main{padding:18px 16px 50px;}
}
</style>
</head>

/* ---------------- storage layer: Google Drive ----------------
   Everything is kept in ONE JSON file in the signed-in user's own Google
   Drive (created by, and only visible to, this app — drive.file scope).
   Every device signed into the same Google account reads/writes that file.
------------------------------------------------------------------ */
const CONFIG = {
  // Paste your OAuth Web Client ID here (see setup guide) — looks like: 123-abc.apps.googleusercontent.com
  CLIENT_ID: '980921219029-4tobauivtpokei2r2inq8bqb310ov89n.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email',
  DATA_FILENAME: 'breadbox-data.json'
};
let accessToken = null, driveFileId = null, signedInEmail = null, tokenClient = null;
let saveTimer = null, refreshTimer = null, attemptingSilent = false;
const SIGNED_IN_FLAG = 'breadbox_signed_in';

function emptyState(){ return { ingredients:[], recipes:[], stockIn:[], production:[], orders:[], shiftEnd:[], adjustments:[], menuItems:[] }; }

function isConfigured(){ return CONFIG.CLIENT_ID && !CONFIG.CLIENT_ID.includes('PASTE_YOUR'); }

function initGoogle(){
  if(!isConfigured() || typeof google === 'undefined' || !google.accounts) return false;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: async (resp)=>{
      const wasSilent = attemptingSilent;
      attemptingSilent = false;
      if(resp.error){
        localStorage.removeItem(SIGNED_IN_FLAG);
        if(!wasSilent) toast('Google sign-in failed: '+resp.error, true);
        renderSignInScreen();
        return;
      }
      accessToken = resp.access_token;
      localStorage.setItem(SIGNED_IN_FLAG, '1');
      // silently refresh the token in the background ~5 min before it expires
      clearTimeout(refreshTimer);
      const expiresInMs = (Number(resp.expires_in)||3600) * 1000;
      refreshTimer = setTimeout(trySilentSignIn, Math.max(expiresInMs - 5*60*1000, 30000));
      renderSignInScreen(true); // show "connecting…" state
      try{
        await fetchProfile();
        await ensureDriveFile();
        await loadStateFromDrive();
        ready = true;
        renderShell();
      }catch(e){ toast('Could not connect to Google Drive. Please try again.', true); renderSignInScreen(); }
    }
  });
  return true;
}
function signIn(){ if(tokenClient) tokenClient.requestAccessToken({prompt:'consent'}); }
function trySilentSignIn(){ if(tokenClient){ attemptingSilent = true; tokenClient.requestAccessToken({prompt:''}); } }
function signOut(){
  if(accessToken && google.accounts && google.accounts.oauth2) google.accounts.oauth2.revoke(accessToken, ()=>{});
  clearTimeout(refreshTimer);
  accessToken=null; driveFileId=null; signedInEmail=null; ready=false;
  localStorage.removeItem(SIGNED_IN_FLAG);
  renderSignInScreen();
}
async function fetchProfile(){
  const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {headers:{Authorization:'Bearer '+accessToken}});
  if(res.ok){ const data = await res.json(); signedInEmail = data.email; }
}
async function ensureDriveFile(){
  const q = encodeURIComponent(`name='${CONFIG.DATA_FILENAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`, { headers:{Authorization:'Bearer '+accessToken} });
  const data = await res.json();
  if(data.files && data.files.length){ driveFileId = data.files[0].id; return; }
  // no file yet — create one with an empty data set
  const boundary = 'breadboxbound_'+uid();
  const metadata = { name: CONFIG.DATA_FILENAME, mimeType:'application/json' };
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
               `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(emptyState())}\r\n--${boundary}--`;
  const createRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method:'POST', headers:{Authorization:'Bearer '+accessToken, 'Content-Type':`multipart/related; boundary=${boundary}`}, body
  });
  const created = await createRes.json();
  driveFileId = created.id;
}
async function loadStateFromDrive(){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, { headers:{Authorization:'Bearer '+accessToken} });
  const text = await res.text();
  try{ state = Object.assign(emptyState(), JSON.parse(text)); }catch(e){ state = emptyState(); }
}
async function loadAll(){ if(accessToken && driveFileId) await loadStateFromDrive(); }
function persistState(){
  clearTimeout(saveTimer);
  return new Promise(resolve=>{
    saveTimer = setTimeout(async ()=>{
      if(!accessToken || !driveFileId){ resolve(); return; }
      try{
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method:'PATCH', headers:{Authorization:'Bearer '+accessToken, 'Content-Type':'application/json'}, body: JSON.stringify(state)
        });
        const lbl = document.getElementById('syncLabel'); if(lbl) lbl.textContent = 'Saved to Google Drive';
      }catch(e){ toast('Could not save to Google Drive — check your connection.', true); }
      resolve();
    }, 350);
  });
}
async function saveIngredients(){ await persistState(); }
async function saveRecipes(){ await persistState(); }
async function saveLogEntry(field, obj){ await persistState(); }
async function deleteLogEntry(field, id){ await persistState(); }

/* ---------------- toast ---------------- */
function toast(msg, isError){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; document.body.appendChild(t);
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#271C13;color:#f1e9da;padding:11px 20px;border-radius:9px;font-size:13.5px;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;';
  }
  t.textContent = msg; t.style.background = isError? '#9C2B2B':'#271C13';
  t.style.opacity='1';
  clearTimeout(t._h); t._h = setTimeout(()=>{ t.style.opacity='0'; }, 2400);
}

/* ---------------- derived calcs ---------------- */
function ingredientBalance(ingId){
  let total = 0;
  state.stockIn.forEach(s=>{ if(s.ingredientId===ingId) total += Number(s.qty)||0; });
  state.production.forEach(p=>{
    const r = state.recipes.find(x=>x.id===p.recipeId); if(!r) return;
    r.lines.forEach(l=>{ if(l.ingredientId===ingId) total -= (Number(l.qty)||0) * (Number(p.qty)||0); });
  });
  state.adjustments.forEach(a=>{ if(a.ingredientId===ingId) total += Number(a.delta)||0; });
  return total;
}
function recipeIngredientCost(recipe){
  let cost = 0;
  (recipe.lines||[]).forEach(l=>{
    const ing = state.ingredients.find(i=>i.id===l.ingredientId);
    if(ing) cost += (Number(l.qty)||0) * (Number(ing.costPerUnit)||0);
  });
  return cost;
}
function recipeTotalCost(recipe){ return recipeIngredientCost(recipe) + (Number(recipe.laborCost)||0) + (Number(recipe.overheadCost)||0); }
function recipeCostPerUnit(recipe){ const y = Number(recipe.yieldQty)||1; return recipeTotalCost(recipe)/y; }
function recipeMargin(recipe){
  const cpu = recipeCostPerUnit(recipe); const sp = Number(recipe.sellingPrice)||0;
  if(!sp) return null;
  return ((sp - cpu)/sp)*100;
}
function recipeName(id){ const r = state.recipes.find(x=>x.id===id); return r? r.name : '(deleted recipe)'; }
function ingName(id){ const i = state.ingredients.find(x=>x.id===id); return i? i.name : '(deleted ingredient)'; }
function ingUnit(id){ const i = state.ingredients.find(x=>x.id===id); return i? i.unit : ''; }

/* ================= DASHBOARD ================= ============================*/
function renderDashboard(){
  const todayStr = today();
  const lowStock = state.ingredients.filter(i=> i.minStock!=null && i.minStock!=='' && ingredientBalance(i.id) <= Number(i.minStock));
  const stockValue = state.ingredients.reduce((sum,i)=> sum + ingredientBalance(i.id) * (Number(i.costPerUnit)||0), 0);
  const todaysProd = state.production.filter(p=>p.date===todayStr);
  const todaysProdCost = todaysProd.reduce((s,p)=>{ const r=state.recipes.find(x=>x.id===p.recipeId); return s + (r? recipeTotalCost(r)/(Number(r.yieldQty)||1)*(Number(p.qty)||0):0); },0);
  const dueOrders = state.orders.filter(o=> o.status!=='delivered' && o.dueDate && o.dueDate<=addDays(todayStr,2));
  const badMargins = state.recipes.filter(r=> { const m=recipeMargin(r); return m!==null && m<0; });

  return `
  <div class="page-head"><div><h1>Dashboard</h1><div class="page-sub">${new Date().toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div></div>

  <div class="grid cols-4">
    <div class="card stat-card ${lowStock.length? 'warn':'good'}"><div class="label">Low stock alerts</div><div class="value">${lowStock.length}</div><div class="sub">${lowStock.length? lowStock.slice(0,3).map(i=>i.name).join(', ') : 'All ingredients healthy'}</div></div>
    <div class="card stat-card"><div class="label">Stock on hand (value)</div><div class="value">${fmt(stockValue)}</div><div class="sub">${state.ingredients.length} ingredients tracked</div></div>
    <div class="card stat-card"><div class="label">Produced today</div><div class="value">${todaysProd.reduce((s,p)=>s+(Number(p.qty)||0),0)}</div><div class="sub">Cost ${fmt(todaysProdCost)}</div></div>
    <div class="card stat-card ${dueOrders.length?'warn':''}"><div class="label">Orders due (48h)</div><div class="value">${dueOrders.length}</div><div class="sub">${dueOrders.length? 'Check Bulk Orders tab':'Nothing pressing'}</div></div>
  </div>

  ${badMargins.length? `
  <div class="section-title">⚠ Recipes selling below cost <span class="tag">${badMargins.length}</span></div>
  <div class="table-wrap table-scroll"><table><thead><tr><th>Recipe</th><th>Cost / unit</th><th>Selling price</th><th>Margin</th></tr></thead><tbody>
  ${badMargins.map(r=>`<tr><td>${esc(r.name)}</td><td>${fmt(recipeCostPerUnit(r))}</td><td>${fmt(r.sellingPrice)}</td><td class="margin-bad">${recipeMargin(r).toFixed(1)}%</td></tr>`).join('')}
  </tbody></table></div>` : ''}

  <div class="section-title">Recent activity</div>
  <div class="table-wrap table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Detail</th></tr></thead><tbody>
  ${recentActivity().map(a=>`<tr><td>${fmtDate(a.date)}</td><td>${a.type}</td><td>${a.detail}</td></tr>`).join('') || `<tr><td colspan="3" class="empty">No activity logged yet — start by adding ingredients and stock-in entries.</td></tr>`}
  </tbody></table></div>
  `;
}
function addDays(d,n){ const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function recentActivity(){
  const items = [];
  state.stockIn.forEach(s=> items.push({date:s.date, type:'Stock in', detail:`${ingName(s.ingredientId)} +${fmtQ(s.qty)} ${ingUnit(s.ingredientId)} from ${esc(s.supplier||'—')}`}));
  state.production.forEach(p=> items.push({date:p.date, type:'Production', detail:`${recipeName(p.recipeId)} × ${fmtQ(p.qty)}`}));
  state.orders.forEach(o=> items.push({date:o.date, type:'Order', detail:`${esc(o.customer)} — ${o.status}`}));
  state.shiftEnd.forEach(s=> items.push({date:s.date, type:'Shift-end', detail:`${recipeName(s.recipeId)} (${s.shift}) closing ${fmtQ(s.closing)}`}));
  return items.sort((a,b)=> b.date.localeCompare(a.date)).slice(0,10);
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function wireDashboard(){}

/* ================= INGREDIENTS ================= */
let showIngForm = false, editIngId = null;
function renderIngredients(){
  const rows = state.ingredients.slice().sort((a,b)=>a.name.localeCompare(b.name));
  return `
  <div class="page-head"><div><h1>Ingredients</h1><div class="page-sub">Master list — unit costs feed every recipe calculation</div></div>
    <button class="btn gold" id="btnAddIng">${iconPlus()} Add ingredient</button></div>
  ${showIngForm? ingForm(state.ingredients.find(i=>i.id===editIngId)) : ''}
  <div class="table-wrap table-scroll"><table><thead><tr><th>Name</th><th>Unit</th><th>Cost / unit</th><th>Current balance</th><th>Min stock</th><th></th></tr></thead><tbody>
  ${rows.map(i=>{
    const bal = ingredientBalance(i.id);
    const low = i.minStock!=null && i.minStock!=='' && bal<=Number(i.minStock);
    return `<tr><td>${esc(i.name)}</td><td class="muted">${esc(i.unit)}</td><td>${fmt(i.costPerUnit)}</td>
      <td>${fmtQ(bal)} ${esc(i.unit)} ${low?'<span class="pill low">low</span>':''}</td>
      <td class="muted">${i.minStock!=null&&i.minStock!==''? fmtQ(i.minStock)+' '+esc(i.unit) : '—'}</td>
      <td><button class="icon-btn" data-edit="${i.id}">Edit</button><button class="icon-btn" data-del="${i.id}">${iconTrash()}</button></td></tr>`;
  }).join('') || `<tr><td colspan="6" class="empty">No ingredients yet. Add flour, sugar, butter etc. to start costing recipes.</td></tr>`}
  </tbody></table></div>
  `;
}
function ingForm(existing){
  const i = existing || {name:'',unit:'kg',costPerUnit:'',minStock:''};
  return `<div class="form-panel"><h3 style="font-size:15px;margin-bottom:12px;">${existing?'Edit':'New'} ingredient</h3>
    <div class="form-row">
      <div class="field"><label>Name</label><input id="fName" value="${esc(i.name)}" placeholder="e.g. All-purpose flour"></div>
      <div class="field"><label>Unit</label><select id="fUnit">
        ${['kg','g','l','ml','pc','dozen','pack'].map(u=>`<option ${u===i.unit?'selected':''}>${u}</option>`).join('')}</select></div>
      <div class="field"><label>Cost per unit (${CUR.trim()})</label><input id="fCost" type="number" step="0.01" value="${i.costPerUnit}" placeholder="0.00"></div>
      <div class="field"><label>Min stock alert (optional)</label><input id="fMin" type="number" step="0.01" value="${i.minStock}" placeholder="e.g. 5"></div>
    </div>
    <div class="form-actions"><button class="btn gold" id="fSave">Save</button><button class="btn ghost" id="fCancel">Cancel</button></div>
  </div>`;
}
function wireIngredients(){
  document.getElementById('btnAddIng').onclick = ()=>{ showIngForm=true; editIngId=null; renderPage(); };
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ editIngId=b.dataset.edit; showIngForm=true; renderPage(); });
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick=async()=>{
    if(!confirm('Delete this ingredient? Existing recipes referencing it will show as missing.')) return;
    state.ingredients = state.ingredients.filter(i=>i.id!==b.dataset.del);
    await saveIngredients(); toast('Ingredient deleted'); renderPage();
  });
  const save = document.getElementById('fSave');
  if(save) save.onclick = async ()=>{
    const name = document.getElementById('fName').value.trim();
    if(!name){ toast('Name is required', true); return; }
    const obj = { id: editIngId||uid(), name, unit: document.getElementById('fUnit').value,
      costPerUnit: parseFloat(document.getElementById('fCost').value)||0,
      minStock: document.getElementById('fMin').value===''? '' : parseFloat(document.getElementById('fMin').value) };
    if(editIngId){ state.ingredients = state.ingredients.map(i=> i.id===editIngId? obj : i); }
    else state.ingredients.push(obj);
    await saveIngredients(); toast('Ingredient saved'); showIngForm=false; renderPage();
  };
  const cancel = document.getElementById('fCancel'); if(cancel) cancel.onclick = ()=>{ showIngForm=false; renderPage(); };
}

/* ================= RECIPES ================= */
let showRecForm=false, editRecId=null, draftLines=[];
function renderRecipes(){
  const rows = state.recipes.slice().sort((a,b)=>a.name.localeCompare(b.name));
  return `
  <div class="page-head"><div><h1>Recipe Calculator</h1><div class="page-sub">Cost every recipe from ingredients up, and check margin against your selling price</div></div>
    <button class="btn gold" id="btnAddRec">${iconPlus()} New recipe</button></div>
  ${showRecForm? recForm(state.recipes.find(r=>r.id===editRecId)) : ''}
  <div class="table-wrap table-scroll"><table><thead><tr><th>Recipe</th><th>Category</th><th>Yield</th><th>Cost/unit</th><th>Selling price</th><th>Margin</th><th></th></tr></thead><tbody>
  ${rows.map(r=>{
    const cpu = recipeCostPerUnit(r); const m = recipeMargin(r);
    return `<tr><td>${esc(r.name)}</td><td class="muted">${esc(r.category||'—')}</td><td class="muted">${r.yieldQty} ${esc(r.yieldUnit||'')}</td>
      <td>${fmt(cpu)}</td><td>${r.sellingPrice? fmt(r.sellingPrice):'—'}</td>
      <td>${m===null?'—':`<span class="${m<0?'margin-bad':'margin-good'}">${m.toFixed(1)}%</span>`}</td>
      <td><button class="icon-btn" data-edit="${r.id}">Edit</button><button class="icon-btn" data-del="${r.id}">${iconTrash()}</button></td></tr>`;
  }).join('') || `<tr><td colspan="7" class="empty">No recipes yet. Add ingredients first, then build a recipe here.</td></tr>`}
  </tbody></table></div>
  `;
}
function recForm(existing){
  const r = existing || {name:'',category:'',yieldQty:1,yieldUnit:'pcs',laborCost:'',overheadCost:'',sellingPrice:''};
  draftLines = existing? JSON.parse(JSON.stringify(existing.lines||[])) : (draftLines.length? draftLines : [{ingredientId:'',qty:''}]);
  const tempCost = draftLines.reduce((s,l)=>{ const ing=state.ingredients.find(i=>i.id===l.ingredientId); return s+(ing?(Number(l.qty)||0)*(Number(ing.costPerUnit)||0):0); },0);
  const labor = document.getElementById('fLabor')? parseFloat(document.getElementById('fLabor').value)||0 : Number(r.laborCost)||0;
  const overhead = document.getElementById('fOverhead')? parseFloat(document.getElementById('fOverhead').value)||0 : Number(r.overheadCost)||0;
  const yieldQty = document.getElementById('fYield')? parseFloat(document.getElementById('fYield').value)||1 : Number(r.yieldQty)||1;
  const sellingPrice = document.getElementById('fSell')? parseFloat(document.getElementById('fSell').value)||0 : Number(r.sellingPrice)||0;
  const totalCost = tempCost + labor + overhead;
  const cpu = totalCost/(yieldQty||1);
  const margin = sellingPrice? ((sellingPrice-cpu)/sellingPrice*100) : null;

  return `<div class="form-panel"><h3 style="font-size:15px;margin-bottom:12px;">${existing?'Edit':'New'} recipe</h3>
    <div class="form-row">
      <div class="field"><label>Recipe name</label><input id="fRName" value="${esc(r.name)}" placeholder="e.g. Butter Croissant"></div>
      <div class="field"><label>Category</label><input id="fRCat" value="${esc(r.category)}" placeholder="e.g. Pastry"></div>
      <div class="field"><label>Yield quantity</label><input id="fYield" type="number" step="1" value="${r.yieldQty}" oninput="renderRecFormLive()"></div>
      <div class="field"><label>Yield unit</label><input id="fYieldUnit" value="${esc(r.yieldUnit||'pcs')}" placeholder="pcs / batch"></div>
    </div>

    <label style="font-size:12px;font-weight:600;color:var(--ink-soft);">Ingredient lines</label>
    <div id="lineRows">${draftLines.map((l,idx)=>lineRow(l,idx)).join('')}</div>
    <button class="btn ghost sm" id="addLine" type="button">${iconPlus()} Add ingredient line</button>

    <div class="form-row" style="margin-top:16px;">
      <div class="field"><label>Labor cost (${CUR.trim()}, per batch)</label><input id="fLabor" type="number" step="0.01" value="${r.laborCost}" oninput="renderRecFormLive()"></div>
      <div class="field"><label>Overhead / packaging (${CUR.trim()}, per batch)</label><input id="fOverhead" type="number" step="0.01" value="${r.overheadCost}" oninput="renderRecFormLive()"></div>
      <div class="field"><label>Selling price (per yield unit)</label><input id="fSell" type="number" step="0.01" value="${r.sellingPrice}" oninput="renderRecFormLive()"></div>
    </div>

    <div class="recipe-cost-box">
      <div class="recipe-cost-row"><span>Ingredient cost</span><span>${fmt(tempCost)}</span></div>
      <div class="recipe-cost-row"><span>Labor + overhead</span><span>${fmt(labor+overhead)}</span></div>
      <div class="recipe-cost-row total"><span>Total cost per batch</span><span>${fmt(totalCost)}</span></div>
      <div class="recipe-cost-row"><span>Cost per ${esc(document.getElementById('fYieldUnit')?document.getElementById('fYieldUnit').value:(r.yieldUnit||'unit'))}</span><span>${fmt(cpu)}</span></div>
      ${sellingPrice? `<div class="recipe-cost-row"><span>Margin at ${fmt(sellingPrice)}</span><span class="${margin<0?'margin-bad':'margin-good'}">${margin.toFixed(1)}%</span></div>`:''}
    </div>

    <div class="form-actions"><button class="btn gold" id="fRSave">Save recipe</button><button class="btn ghost" id="fRCancel">Cancel</button></div>
  </div>`;
}
function lineRow(l, idx){
  return `<div class="line-item" data-idx="${idx}">
    <select class="lineIng" data-idx="${idx}">
      <option value="">Select ingredient…</option>
      ${state.ingredients.map(i=>`<option value="${i.id}" ${i.id===l.ingredientId?'selected':''}>${esc(i.name)} (${esc(i.unit)})</option>`).join('')}
    </select>
    <input class="lineQty" data-idx="${idx}" type="number" step="0.01" placeholder="qty" value="${l.qty}">
    <div class="muted" style="font-size:12.5px;">${(()=>{ const ing=state.ingredients.find(i=>i.id===l.ingredientId); return ing? fmt((Number(l.qty)||0)*(Number(ing.costPerUnit)||0)) : '—'; })()}</div>
    <button class="icon-btn removeLine" data-idx="${idx}">${iconTrash()}</button>
  </div>`;
}
window.renderRecFormLive = function(){
  // re-render just the form in place, preserving current draftLines + field values not yet committed
  const active = document.activeElement ? document.activeElement.id : null;
  const html = recForm(editRecId? state.recipes.find(r=>r.id===editRecId): null);
  const panel = document.querySelector('.form-panel');
  if(panel){ panel.outerHTML = html; wireRecForm(); if(active){ const el=document.getElementById(active); if(el){ el.focus(); } } }
};
function wireRecipes(){
  document.getElementById('btnAddRec').onclick = ()=>{ showRecForm=true; editRecId=null; draftLines=[{ingredientId:'',qty:''}]; renderPage(); };
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ editRecId=b.dataset.edit; showRecForm=true; renderPage(); });
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick=async()=>{
    if(!confirm('Delete this recipe?')) return;
    state.recipes = state.recipes.filter(r=>r.id!==b.dataset.del);
    await saveRecipes(); toast('Recipe deleted'); renderPage();
  });
  if(showRecForm) wireRecForm();
}
function wireRecForm(){
  const addLine = document.getElementById('addLine');
  if(addLine) addLine.onclick = ()=>{ draftLines.push({ingredientId:'',qty:''}); window.renderRecFormLive(); };
  document.querySelectorAll('.lineIng').forEach(s=> s.onchange = ()=>{ draftLines[s.dataset.idx].ingredientId = s.value; window.renderRecFormLive(); });
  document.querySelectorAll('.lineQty').forEach(inp=> inp.oninput = ()=>{ draftLines[inp.dataset.idx].qty = inp.value; window.renderRecFormLive(); });
  document.querySelectorAll('.removeLine').forEach(b=> b.onclick = ()=>{ draftLines.splice(b.dataset.idx,1); if(!draftLines.length) draftLines=[{ingredientId:'',qty:''}]; window.renderRecFormLive(); });
  const save = document.getElementById('fRSave');
  if(save) save.onclick = async ()=>{
    const name = document.getElementById('fRName').value.trim();
    if(!name){ toast('Recipe name is required', true); return; }
    const lines = draftLines.filter(l=>l.ingredientId && l.qty!=='').map(l=>({ingredientId:l.ingredientId, qty:parseFloat(l.qty)||0}));
    const obj = { id: editRecId||uid(), name, category: document.getElementById('fRCat').value.trim(),
      yieldQty: parseFloat(document.getElementById('fYield').value)||1, yieldUnit: document.getElementById('fYieldUnit').value.trim()||'pcs',
      lines, laborCost: parseFloat(document.getElementById('fLabor').value)||0, overheadCost: parseFloat(document.getElementById('fOverhead').value)||0,
      sellingPrice: parseFloat(document.getElementById('fSell').value)||0 };
    if(editRecId){ state.recipes = state.recipes.map(r=> r.id===editRecId? obj : r); } else state.recipes.push(obj);
    await saveRecipes(); toast('Recipe saved'); showRecForm=false; renderPage();
  };
  const cancel = document.getElementById('fRCancel'); if(cancel) cancel.onclick = ()=>{ showRecForm=false; renderPage(); };
}

/* ================= MENU ================= */
let showMenuForm=false, editMenuId=null;
function menuCategories(){
  const set = new Set(state.menuItems.map(m=>m.category||'Uncategorized'));
  return [...set].sort((a,b)=> a==='Uncategorized'? 1 : b==='Uncategorized'? -1 : a.localeCompare(b));
}

  const cats = menuCategories();
  const grouped = cats.map(cat=> ({cat, items: state.menuItems.filter(m=>(m.category||'Uncategorized')===cat).sort((a,b)=>a.name.localeCompare(b.name))}));
  return `
  <div class="page-head"><div><h1>Menu</h1><div class="page-sub">Set today's quantities, then export the kitchen's production list</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn ghost" id="btnAddMenuItem">${iconPlus()} Add menu item</button>
      <button class="btn gold" id="btnExportPdf">${iconDownload()} Export production list (PDF)</button>
    </div>
  </div>
  ${showMenuForm? menuItemForm(state.menuItems.find(m=>m.id===editMenuId)) : ''}
  ${grouped.length? grouped.map(g=>`
    <div class="section-title">${esc(g.cat)}</div>
    <div class="table-wrap table-scroll"><table><thead><tr><th>Item</th><th>Unit</th><th>Qty</th><th>Date</th><th>Note</th><th></th></tr></thead><tbody>
    ${g.items.map(m=>`<tr>
      <td>${esc(m.name)}</td>
      <td class="muted">${esc(m.unit)}</td>
      <td><input class="mQty" data-id="${m.id}" type="number" step="0.5" value="${m.qty!=null?m.qty:''}" style="width:80px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;"></td>
      <td><input class="mDate" data-id="${m.id}" type="date" value="${m.date||today()}" style="padding:6px 8px;border:1px solid var(--line);border-radius:6px;"></td>
      <td><input class="mNote" data-id="${m.id}" type="text" value="${esc(m.note||'')}" placeholder="optional" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;"></td>
      <td style="white-space:nowrap;"><button class="icon-btn" data-edit="${m.id}">Edit</button><button class="icon-btn" data-del="${m.id}">${iconTrash()}</button></td>
    </tr>`).join('')}
    </tbody></table></div>
  `).join('') : `<div class="table-wrap"><div class="empty">No menu items yet. Add your first item to start building today's production list.</div></div>`}
  `;
}
function menuItemForm(existing){
  const m = existing || {name:'',category:'',unit:'pcs',qty:'',date:today(),note:''};
  const existingCats = menuCategories().filter(c=>c!=='Uncategorized');
  return `<div class="form-panel"><h3 style="font-size:15px;margin-bottom:12px;">${existing?'Edit':'New'} menu item</h3>

function exportMenuPDF(){
  if(typeof jspdf === 'undefined'){ toast('PDF library did not load — check your connection.', true); return; }
  const items = state.menuItems.slice();
  if(!items.length){ toast('Add at least one menu item first', true); return; }
  const { jsPDF } = jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const marginX = 40, pageWidth = doc.internal.pageSize.getWidth();
  let y = 50;
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(20);
  doc.text('Breadbox — Production List', marginX, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
  doc.text(`Generated ${new Date().toLocaleDateString()}`, pageWidth-marginX, y, {align:'right'});
  y += 10;
  doc.setDrawColor(40); doc.setLineWidth(1); doc.line(marginX, y, pageWidth-marginX, y);
  y += 18;

  const cats = menuCategories();
  cats.forEach(cat=>{
    const rows = items.filter(i=>(i.category||'Uncategorized')===cat).sort((a,b)=>a.name.localeCompare(b.name));
    if(!rows.length) return;
    if(y > 740){ doc.addPage(); y = 50; }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(168,122,31);
    doc.text(cat.toUpperCase(), marginX, y);
    doc.autoTable({
      startY: y+8,
      head: [[ '', 'Item', 'Qty', 'Date', 'Notes' ]],
      body: rows.map(i=>['', i.name, `${fmtQ(i.qty)} ${i.unit||''}`.trim(), fmtDate(i.date), i.note||'']),
      theme:'grid',
      margin:{left:marginX, right:marginX},
      styles:{fontSize:10, cellPadding:6, valign:'middle', textColor:[39,28,19]},
      headStyles:{fillColor:[36,26,18], textColor:255, fontStyle:'bold', fontSize:9.5},
      columnStyles:{0:{cellWidth:22}, 1:{cellWidth:160}, 2:{cellWidth:75}, 3:{cellWidth:70}, 4:{cellWidth:'auto'}},
      didDrawCell: (data)=>{
        if(data.column.index===0 && data.section==='body'){
          const {x,y:cy,width,height} = data.cell;
          doc.setDrawColor(60); doc.setLineWidth(1);
          doc.rect(x+width/2-6, cy+height/2-6, 12, 12);
        }
      }
    });
    y = doc.lastAutoTable.finalY + 26;
  });

  doc.save(`Breadbox_Production_${today()}.pdf`);
  toast('Production list PDF downloaded');
}

  ${rows.map(s=>{
    const expected = (Number(s.opened)||0)+(Number(s.produced)||0)-(Number(s.sold)||0)-(Number(s.wasted)||0);
    const diff = (Number(s.closing)||0)-expected;
    return `<tr><td>${fmtDate(s.date)}</td><td class="muted">${esc(s.shift)}</td><td>${recipeName(s.recipeId)}</td><td>${fmtQ(s.opened)}</td><td>${fmtQ(s.produced)}</td><td>${fmtQ(s.sold)}</td><td>${fmtQ(s.wasted)}</td><td>${fmtQ(s.closing)}</td>
    <td>${diff===0? '<span class="pill ok">Matches</span>' : `<span class="pill ${Math.abs(diff)>2?'low':'mid'}">${diff>0?'+':''}${fmtQ(diff)}</span>`}</td>
    <td><button class="icon-btn" data-del="${s.id}">${iconTrash()}</button></td></tr>`;
  }).join('') || `<tr><td colspan="10" class="empty">No shift-end counts logged yet.</td></tr>`}
  </tbody></table></div>
  `;
}
function shiftForm(){
  return `<div class="form-panel"><h3 style="font-size:15px;margin-bottom:12px;">Log shift-end count</h3>
    <div class="form-row">
      <div class="field"><label>Date</label><input id="shDate" type="date" value="${today()}"></div>
      <div class="field"><label>Shift</label><select id="shShift"><option>Morning</option><option>Afternoon</option><option>Evening</option></select></div>
      <div class="field"><label>Product (recipe)</label><select id="shRecipe"><option value="">Select…</option>${state.recipes.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Opened with (stock at shift start)</label><input id="shOpened" type="number" step="1" value="0"></div>
      <div class="field"><label>Produced this shift</label><input id="shProduced" type="number" step="1" value="0"></div>
      <div class="field"><label>Sold this shift</label><input id="shSold" type="number" step="1" value="0"></div>
      <div class="field"><label>Wasted / spoiled</label><input id="shWasted" type="number" step="1" value="0"></div>
      <div class="field"><label>Actual closing count</label><input id="shClosing" type="number" step="1" value="0"></div>
    </div>
    <div class="form-actions"><button class="btn gold" id="shSave">Save</button><button class="btn ghost" id="shCancel">Cancel</button></div>
  </div>`;
}
function wireShiftEnd(){
  document.getElementById('btnAddShift').onclick = ()=>{ showShiftForm=true; renderPage(); };
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick=async()=>{
    state.shiftEnd = state.shiftEnd.filter(s=>s.id!==b.dataset.del);
    await deleteLogEntry('shiftEnd', b.dataset.del); toast('Entry deleted'); renderPage();
  });
  const save = document.getElementById('shSave');
  if(save) save.onclick = async ()=>{
    const recipeId = document.getElementById('shRecipe').value;
    if(!recipeId){ toast('Select a product', true); return; }
    const obj = { id: uid(), date: document.getElementById('shDate').value||today(), shift: document.getElementById('shShift').value, recipeId,
      opened: parseFloat(document.getElementById('shOpened').value)||0, produced: parseFloat(document.getElementById('shProduced').value)||0,
      sold: parseFloat(document.getElementById('shSold').value)||0, wasted: parseFloat(document.getElementById('shWasted').value)||0,
      closing: parseFloat(document.getElementById('shClosing').value)||0 };
    state.shiftEnd.push(obj); await saveLogEntry('shiftEnd', obj); toast('Shift count logged'); showShiftForm=false; renderPage();
  };
  const cancel = document.getElementById('shCancel'); if(cancel) cancel.onclick=()=>{ showShiftForm=false; renderPage(); };
}

/* ================= EXPORT TO EXCEL ================= */
let showExportModal = false;
function renderModal(){
  const host = document.getElementById('modalHost');
  if(!host) return;
  if(!showExportModal){ host.innerHTML=''; return; }
  const t = today();
  host.innerHTML = `
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h3>Export to Excel</h3>
      <div class="modal-sub">Downloads an .xlsx file with a sheet per section. Log sheets (stock in, production, orders, shift-end) are filtered to the date range below; Stock Balance, Ingredients and Recipes are always a full current snapshot.</div>
      <div class="form-row" style="grid-template-columns:1fr 1fr;">
        <div class="field"><label>From</label><input id="exFrom" type="date" value="${t}"></div>
        <div class="field"><label>To</label><input id="exTo" type="date" value="${t}"></div>
      </div>
      <div style="margin:6px 0 4px;font-size:12px;font-weight:600;color:var(--ink-soft);">Include sheets</div>
      <label class="check-row"><input type="checkbox" id="exStockIn" checked> Stock In</label>
      <label class="check-row"><input type="checkbox" id="exProduction" checked> Daily Production</label>
      <label class="check-row"><input type="checkbox" id="exOrders" checked> Bulk Orders</label>
      <label class="check-row"><input type="checkbox" id="exShiftEnd" checked> Shift-End Count</label>
      <label class="check-row"><input type="checkbox" id="exBalance" checked> Stock Balance (snapshot)</label>
      <label class="check-row"><input type="checkbox" id="exIngredients"> Ingredients (reference)</label>
      <label class="check-row"><input type="checkbox" id="exRecipes"> Recipes (reference)</label>
      <div class="form-actions">
        <button class="btn gold" id="exGo">${iconDownload()} Download .xlsx</button>
        <button class="btn ghost" id="exClose">Cancel</button>
      </div>
    </div>
  </div>`;
  document.getElementById('exClose').onclick = ()=>{ showExportModal=false; renderModal(); };
  document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay'){ showExportModal=false; renderModal(); } });
  document.getElementById('exGo').onclick = doExport;
}
function inRange(dateStr, from, to){ if(!dateStr) return false; return dateStr>=from && dateStr<=to; }
function doExport(){
  if(typeof XLSX === 'undefined'){ toast('Excel library did not load — check your internet connection and try again.', true); return; }
  const from = document.getElementById('exFrom').value || today();
  const to = document.getElementById('exTo').value || today();
  const wb = XLSX.utils.book_new();

  if(document.getElementById('exStockIn').checked){
    const rows = state.stockIn.filter(s=>inRange(s.date,from,to)).sort((a,b)=>a.date.localeCompare(b.date)).map(s=>({
      Date: s.date, Supplier: s.supplier||'', Ingredient: ingName(s.ingredientId), Unit: ingUnit(s.ingredientId),
      Qty: Number(s.qty)||0, 'Unit Cost': Number(s.unitCost)||0, 'Total Cost': (Number(s.qty)||0)*(Number(s.unitCost)||0), Note: s.note||''
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Date:'',Supplier:'',Ingredient:'',Unit:'',Qty:'','Unit Cost':'','Total Cost':'',Note:'No entries in range'}]), 'Stock In');
  }
  if(document.getElementById('exProduction').checked){
    const rows = state.production.filter(p=>inRange(p.date,from,to)).sort((a,b)=>a.date.localeCompare(b.date)).map(p=>{
      const r = state.recipes.find(x=>x.id===p.recipeId);
      return { Date: p.date, Recipe: recipeName(p.recipeId), 'Qty Made': Number(p.qty)||0, 'Batch Cost': r? recipeCostPerUnit(r)*(Number(p.qty)||0) : 0, Note: p.note||'' };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Date:'',Recipe:'','Qty Made':'','Batch Cost':'',Note:'No entries in range'}]), 'Production');
  }
  if(document.getElementById('exOrders').checked){
    const rows = state.orders.filter(o=>inRange(o.date,from,to) || inRange(o.dueDate,from,to)).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')).map(o=>{
      const value = (o.items||[]).reduce((s,it)=>{ const r=state.recipes.find(x=>x.id===it.recipeId); return s+(r?Number(r.sellingPrice)||0:0)*(Number(it.qty)||0); },0);
      return { 'Order Date': o.date, 'Due Date': o.dueDate, Customer: o.customer, Items: (o.items||[]).map(it=>`${recipeName(it.recipeId)} x${it.qty}`).join(', '), Value: value, Status: o.status, Note: o.note||'' };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{'Order Date':'','Due Date':'',Customer:'',Items:'',Value:'',Status:'',Note:'No entries in range'}]), 'Bulk Orders');
  }
  if(document.getElementById('exShiftEnd').checked){
    const rows = state.shiftEnd.filter(s=>inRange(s.date,from,to)).sort((a,b)=>a.date.localeCompare(b.date)).map(s=>{
      const expected = (Number(s.opened)||0)+(Number(s.produced)||0)-(Number(s.sold)||0)-(Number(s.wasted)||0);
      return { Date: s.date, Shift: s.shift, Product: recipeName(s.recipeId), Opened: Number(s.opened)||0, Produced: Number(s.produced)||0, Sold: Number(s.sold)||0, Wasted: Number(s.wasted)||0, Closing: Number(s.closing)||0, Expected: expected, Variance: (Number(s.closing)||0)-expected };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Date:'',Shift:'',Product:'',Opened:'',Produced:'',Sold:'',Wasted:'',Closing:'',Expected:'',Variance:'No entries in range'}]), 'Shift-End');
  }
  if(document.getElementById('exBalance').checked){
    const rows = state.ingredients.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(i=>{
      const bal = ingredientBalance(i.id);
      const low = i.minStock!=null && i.minStock!=='' && bal<=Number(i.minStock);
      return { Ingredient: i.name, Unit: i.unit, Balance: bal, 'Cost/Unit': Number(i.costPerUnit)||0, Value: bal*(Number(i.costPerUnit)||0), Status: low? 'Low — reorder':'Healthy' };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Ingredient:'No ingredients yet'}]), 'Stock Balance');
  }
  if(document.getElementById('exIngredients').checked){
    const rows = state.ingredients.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(i=>({ Name: i.name, Unit: i.unit, 'Cost/Unit': Number(i.costPerUnit)||0, 'Min Stock': i.minStock==null||i.minStock===''? '' : Number(i.minStock) }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Name:'No ingredients yet'}]), 'Ingredients');
  }
  if(document.getElementById('exRecipes').checked){
    const rows = state.recipes.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(r=>{
      const m = recipeMargin(r);
      return { Name: r.name, Category: r.category||'', 'Yield Qty': r.yieldQty, 'Yield Unit': r.yieldUnit, 'Cost/Unit': recipeCostPerUnit(r), 'Selling Price': Number(r.sellingPrice)||0, 'Margin %': m===null? '' : Number(m.toFixed(1)) };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{Name:'No recipes yet'}]), 'Recipes');
  }
  if(wb.SheetNames.length===0){ toast('Select at least one sheet to export', true); return; }
  const filename = `Breadbox_${from}_to_${to}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast('Excel file downloaded');
  showExportModal = false; renderModal();
}

function anyFormOpen(){
  return showIngForm || showRecForm || showMenuForm || showStockInForm || showAdjForm ||
         showProdForm || showOrderForm || showShiftForm || showExportModal;
}

/* ---------------- wiring dispatch ---------------- */
function wireTab(tab){
  ({ dashboard: wireDashboard, ingredients: wireIngredients, recipes: wireRecipes, menu: wireMenu, stockIn: wireStockIn,
     balance: wireBalance, production: wireProduction, orders: wireOrders, shiftEnd: wireShiftEnd })[tab]();
}

/* ---------------- sign-in / setup screens ---------------- */
function renderSetupNeeded(){
  document.getElementById('root').innerHTML = `
  <div class="loading-screen" style="max-width:520px;margin:0 auto;text-align:center;gap:10px;">
    <div style="font-family:var(--font-d);font-size:22px;color:var(--ink);font-weight:600;">One setup step left</div>
    <div style="font-size:13.5px;line-height:1.6;">This copy of Breadbox isn't connected to a Google Drive account yet.
    Open the file, find <code>CONFIG.CLIENT_ID</code> near the top of the script, and paste in your Google OAuth Client ID.
    See the setup guide for exact steps.</div>
  </div>`;
}
function renderSignInScreen(connecting){
  document.getElementById('root').innerHTML = `
  <div class="loading-screen" style="gap:16px;">
    <img src="data:image/png;base64,${LOGO_B64}" style="width:180px;height:auto;" alt="Breadbox">
    ${connecting? `<div class="spinner"></div><div>Connecting to Google Drive…</div>` : `
      <div style="font-size:14px;max-width:340px;text-align:center;line-height:1.6;">Sign in with the Google account your bakery uses.
      All devices signed into this account will share the same data.</div>
      <button class="btn gold" id="btnGoogleSignIn" style="padding:12px 22px;">${iconSvg('<path d="M12 2v20"/>')}Sign in with Google</button>
    `}
  </div>`;
  const btn = document.getElementById('btnGoogleSignIn');
  if(btn) btn.onclick = signIn;
}

/* ---------------- init ---------------- */
async function init(){
  if(!isConfigured()){ renderSetupNeeded(); return; }
  const tryInit = ()=>{
    if(initGoogle()){
      const wasSignedIn = localStorage.getItem(SIGNED_IN_FLAG) === '1';
      if(wasSignedIn){ renderSignInScreen(true); trySilentSignIn(); }
      else{ renderSignInScreen(); }
    }
    else setTimeout(tryInit, 200); // Google Identity Services script may still be loading
  };
  tryInit();
  // periodic refresh so other devices' changes show up
  setInterval(async ()=>{ if(document.hidden || !ready || anyFormOpen()) return; await loadStateFromDrive(); renderPage(); }, 20000);
}
init();
</script>
